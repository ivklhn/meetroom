<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Тайная комната</title>
  <style>
    :root { --bg:#f7f7f8; --card:#fff; --primary:#fc3f1d; --text:#212121; --border:#e2e4e9; --radius:10px; --font:system-ui,-apple-system,sans-serif; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:16px; }
    .card { background:var(--card); border-radius:var(--radius); padding:24px; width:100%; max-width:380px; box-shadow:0 2px 12px rgba(0,0,0,0.06); }
    h1 { font-size:18px; font-weight:600; text-align:center; margin:0 0 18px; letter-spacing:-0.01em; }
    .btn-scan { width:100%; padding:13px; background:var(--primary); color:#fff; border:none; border-radius:var(--radius); font-size:16px; font-weight:500; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
    .btn-scan:active { opacity:0.9; }
    .btn-scan svg { width:20px; height:20px; fill:currentColor; }
    .form-group { margin-bottom:12px; }
    .form-group label { display:block; font-size:13px; color:#666; margin-bottom:4px; }
    .form-control { width:100%; padding:11px 12px; border:1px solid var(--border); border-radius:8px; font-size:15px; background:#fafafa; }
    .form-control:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(252,63,29,0.1); }
    .emoji-grid { display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; }
    .emoji-opt { width:36px; height:36px; display:flex; align-items:center; justify-content:center; font-size:20px; border:2px solid transparent; border-radius:8px; cursor:pointer; background:#f5f5f6; }
    .emoji-opt.sel { border-color:var(--primary); background:rgba(252,63,29,0.1); }
    .hidden { display:none !important; }
    #reg-form { display:none; }

    /* Оверлей камеры */
    .overlay { position:fixed; inset:0; background:#000; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .scan-viewport { width:280px; height:280px; background:#111; overflow:hidden; position:relative; }
    #reader { width:100%; height:100%; }
    #reader video { width:100%; height:100%; object-fit:cover; }
    .btn-close { margin-top:20px; padding:11px 32px; background:rgba(255,255,255,0.15); color:#fff; border:none; border-radius:8px; font-size:15px; cursor:pointer; }
  </style>
</head>
<body>

  <div class="card">
    <h1>Получите приглашение в тайную комнату</h1>
    <button id="btn-scan" class="btn-scan">
      <svg viewBox="0 0 24 24"><path d="M3 11h2v2H3v-2zm0 4h2v6H3v-6zm4-8h2v2H7V7zm4 0h2v2h-2V7zm4 0h2v2h-2V7zm4 0h2v2h-2V7zM3 3h6v2H3V3zm0 12h2v2H3v-2zm12-8h2v2h-2V7zm4 0h2v2h-2V7zm-8 8h2v2h-2v-2zm4 0h2v2h-2v-2zm4 0h2v2h-2v-2zm-8 4h2v2h-2v-2zm8 0h2v2h-2v-2zm-8 4h2v2h-2v-2zm8 0h2v2h-2v-2z"/></svg>
      Сканировать
    </button>

    <div id="reg-form">
      <h1>Регистрация</h1>
      <form id="data-form">
        <div class="form-group"><label>Имя</label><input type="text" id="f-name" class="form-control" required></div>
        <div class="form-group"><label>Телефон</label><input type="tel" id="f-phone" class="form-control" placeholder="+7..." required></div>
        <div class="form-group"><label>Telegram</label><input type="url" id="f-tg" class="form-control" placeholder="https://t.me/username" required></div>
        <div class="form-group">
          <label>Аватар</label>
          <div class="emoji-grid" id="emoji-pick"></div>
          <input type="hidden" id="f-avatar" required>
        </div>
        <button type="submit" class="btn-scan">Сохранить</button>
      </form>
    </div>
  </div>

  <div id="scan-overlay" class="overlay hidden">
    <div class="scan-viewport"><div id="reader"></div></div>
    <button id="btn-cancel" class="btn-close">Закрыть</button>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script>
    const KEY = "secret_invite_v1";
    const SERVER_HASH = "v1"; // Меняйте при сбросе пароля на сервере

    const btnScan = document.getElementById("btn-scan");
    const overlay = document.getElementById("scan-overlay");
    const btnCancel = document.getElementById("btn-cancel");
    const regForm = document.getElementById("reg-form");
    const dataForm = document.getElementById("data-form");
    const emojiGrid = document.getElementById("emoji-pick");
    let scanner = null;

    // Смайлы
    ["😀","😎","🦊","🐱","🐶","🦄","🤖","👻","🌟","🔥","💎","🍀"].forEach(e => {
      const el = document.createElement("div"); el.className = "emoji-opt"; el.textContent = e;
      el.onclick = () => {
        document.querySelectorAll(".emoji-opt").forEach(x => x.classList.remove("sel"));
        el.classList.add("sel"); document.getElementById("f-avatar").value = e;
      };
      emojiGrid.appendChild(el);
    });

    function checkInvite() {
      const saved = localStorage.getItem(KEY);
      if (!saved) return false;
      const data = JSON.parse(saved);
      if (data.hash !== SERVER_HASH) { localStorage.removeItem(KEY); return false; }
      showReg(data.qr); return true;
    }

    function showReg(qr) {
      document.querySelector(".card h1").style.display = "none";
      btnScan.classList.add("hidden");
      regForm.style.display = "block";
    }

    // Запуск сканера
    btnScan.onclick = () => {
      overlay.classList.remove("hidden");
      scanner = new Html5Qrcode("reader");
      scanner.start(
        { facingMode: "environment" }, // Только задняя камера
        { fps: 15, qrbox: 240 },      // Быстрый режим, квадратная зона
        (text) => {                    // Успех
          scanner.stop(); scanner = null;
          overlay.classList.add("hidden");
          localStorage.setItem(KEY, JSON.stringify({ qr: text, hash: SERVER_HASH }));
          showReg(text);
        },
        () => {}                       // Ошибки сканирования игнорируем
      ).catch(err => {
        console.error(err);
        alert("Нет доступа к камере. Разрешите доступ в настройках браузера.");
        overlay.classList.add("hidden");
      });
    };

    btnCancel.onclick = () => {
      if (scanner) { scanner.stop(); scanner = null; }
      overlay.classList.add("hidden");
    };

    dataForm.onsubmit = (e) => {
      e.preventDefault();
      if (!document.getElementById("f-avatar").value) return alert("Выберите аватар");
      const payload = {
        name: document.getElementById("f-name").value,
        phone: document.getElementById("f-phone").value,
        telegram: document.getElementById("f-tg").value,
        avatar: document.getElementById("f-avatar").value,
        qr: localStorage.getItem(KEY) ? JSON.parse(localStorage.getItem(KEY)).qr : null
      };
      console.log("Отправка на сервер:", payload);
      // fetch("/api/register", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload) });
    };

    if (!checkInvite()) { /* остаёмся на кнопке */ }
  </script>
</body>
</html>
