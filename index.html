<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Тайная комната</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    :root {
      --bg: #f7f7f8; --primary: #fc3f1d; --border: #e2e4e9; --radius: 8px; --text: #212121;
    }
    body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    .card { border: 1px solid var(--border); border-radius: var(--radius); box-shadow: none; background: #fff; }
    .btn-primary { background: var(--primary); border-color: var(--primary); border-radius: var(--radius); font-weight: 500; padding: 12px 24px; }
    .btn-primary:hover { background: #e63718; border-color: #e63718; }
    .form-control { border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; }
    .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(252, 63, 29, 0.15); }
    .emoji-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
    .emoji-opt { font-size: 24px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border: 2px solid transparent; border-radius: 8px; cursor: pointer; transition: 0.15s; }
    .emoji-opt.sel { border-color: var(--primary); background: rgba(252, 63, 29, 0.08); }
    #reader { width: 100%; max-width: 300px; margin: 0 auto; border: none !important; padding: 0 !important; }
    #reader video { border-radius: 8px; }
    .hidden { display: none !important; }
    /* Скрываем лишние элементы сканера */
    #reader__dashboard_section_csr, #reader__status_span { display: none; }
  </style>
</head>
<body class="d-flex flex-column align-items-center justify-content-center min-vh-100 p-3">
  <div class="card p-4 w-100" style="max-width: 400px;">
    <!-- Шаг 1: Сканирование -->
    <div id="step-scan">
      <h2 class="text-center mb-4 fs-5 fw-semibold">Получите приглашение в тайную комнату</h2>
      <div id="reader" class="mb-3"></div>
      <button id="btn-scan" class="btn btn-primary w-100">Сканировать</button>
    </div>

    <!-- Шаг 2: Регистрация -->
    <div id="step-register" class="hidden">
      <h2 class="text-center mb-4 fs-5 fw-semibold">Регистрация</h2>
      <form id="reg-form">
        <div class="mb-3"><label class="form-label">Имя</label><input type="text" id="f-name" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Телефон</label><input type="tel" id="f-phone" class="form-control" placeholder="+7..." required></div>
        <div class="mb-3"><label class="form-label">Ссылка на Telegram</label><input type="url" id="f-tg" class="form-control" placeholder="https://t.me/username" required></div>
        <div class="mb-4">
          <label class="form-label">Аватар (смайлик)</label>
          <div class="emoji-grid" id="emoji-pick"></div>
          <input type="hidden" id="f-avatar" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Сохранить</button>
      </form>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script>
    const STORE_KEY = "secret_invite";
    // В реальном проекте получайте версию/хэш пароля с сервера: await fetch('/api/invite/version')
    const SERVER_VERSION = "v1"; 

    const stepScan = document.getElementById("step-scan");
    const stepReg = document.getElementById("step-register");
    const btnScan = document.getElementById("btn-scan");
    const readerEl = document.getElementById("reader");
    const regForm = document.getElementById("reg-form");
    const emojiGrid = document.getElementById("emoji-pick");
    let selectedEmoji = "", scanner = null;

    // Инициализация смайлов
    ["😀","😎","🦊","🐱","🐶","🦄","🤖","👻","🌟","🔥","💎","🍀"].forEach(e => {
      const el = document.createElement("div"); el.className = "emoji-opt"; el.textContent = e;
      el.onclick = () => { document.querySelectorAll(".emoji-opt").forEach(x => x.classList.remove("sel")); el.classList.add("sel"); selectedEmoji = e; document.getElementById("f-avatar").value = e; };
      emojiGrid.appendChild(el);
    });

    // Проверка сохранённого приглашения
    function checkInvite() {
      const saved = localStorage.getItem(STORE_KEY);
      if (!saved) return false;
      const data = JSON.parse(saved);
      // Если версия пароля на сервере изменилась — сбрасываем кэш
      if (data.version !== SERVER_VERSION) { localStorage.removeItem(STORE_KEY); return false; }
      showRegister(data.qr); return true;
    }

    function showRegister(qr) {
      stepScan.classList.add("hidden"); stepReg.classList.remove("hidden");
      // Можно подставить qr в скрытое поле для отправки: document.getElementById("f-qr").value = qr;
    }

    // Сканирование
    btnScan.onclick = () => {
      btnScan.classList.add("hidden"); readerEl.classList.remove("hidden");
      scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250, aspectRatio: 1 }, false);
      scanner.render(onSuccess, () => {});
    };

    function onSuccess(text) {
      scanner.clear(); scanner = null;
      readerEl.classList.add("hidden"); btnScan.classList.remove("hidden");
      localStorage.setItem(STORE_KEY, JSON.stringify({ qr: text, version: SERVER_VERSION, ts: Date.now() }));
      showRegister(text);
    }

    // Сохранение регистрации
    regForm.onsubmit = (e) => {
      e.preventDefault();
      if (!selectedEmoji) { alert("Выберите аватар"); return; }
      const payload = {
        name: document.getElementById("f-name").value,
        phone: document.getElementById("f-phone").value,
        telegram: document.getElementById("f-tg").value,
        avatar: selectedEmoji,
        qr: localStorage.getItem(STORE_KEY) ? JSON.parse(localStorage.getItem(STORE_KEY)).qr : null
      };
      console.log("Отправка на сервер:", payload);
      // fetch("/api/register", { method: "POST", body: JSON.stringify(payload) ... })
      alert("Данные сохранены. Переход в комнату...");
    };

    if (!checkInvite()) { /* остаёмся на шаге сканирования */ }
  </script>
</body>
</html>
